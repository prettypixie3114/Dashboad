const KPI_TARGETS={

  contribMargin:{label:'Contribution Margin (period)', fmt:'L', baseline:-1300000, p1:[-200000,300000], p2:[400000,800000], p3:[900000,1500000], source:'meta', weight:'gold'},
  prepaidMix: {label:'Prepaid Mix',        fmt:'%', baseline:35.4,    p1:[45,50],     p2:[52,58],     p3:[55,60],     source:'shopify'},
  cancelRate: {label:'Cancel Rate',        fmt:'%', baseline:10.5,    p1:[8,10],      p2:[6,8],       p3:[5,7],       source:'shopify', inverse:true},
  discountPct:{label:'Discount % of Subtotal', fmt:'%', baseline:29.8,p1:[12,15],     p2:[8,10],      p3:[5,8],       source:'shopify', inverse:true},
  clickToSession:{label:'Click→Session',   fmt:'%', baseline:24,      p1:[40,100],    p2:[50,100],    p3:[60,100],    source:'meta_ga'},

};

// ── helpers ─────────────────────────────────────────────────────────────
const inr=n=>n==null?'—':'₹'+Math.round(n).toLocaleString('en-IN');
const inrL=n=>{if(n==null)return'—';const v=n/100000;return(v<0?'−₹':'₹')+Math.abs(v).toFixed(2)+'L';};
const num=n=>n==null?'—':Number(n).toLocaleString('en-IN');
const pct=(n,d=1)=>n==null?'—':Number(n).toFixed(d)+'%';
const fx=(n,d=2)=>n==null?'—':Number(n).toFixed(d)+'x';
const rc=(r,k)=>!r?'text-stone-600':r>=k*1.15?'text-emerald-400':r>=k?'text-amber-400':'text-red-400';
const fmtKpi=(v,fmt)=>{if(v==null||isNaN(v))return'—';if(fmt==='x')return Number(v).toFixed(2)+'x';if(fmt==='%')return Number(v).toFixed(1)+'%';if(fmt==='₹')return inr(v);if(fmt==='L')return inrL(v);if(fmt==='mo')return Number(v).toFixed(1)+' mo';return v;};

// Status logic — given value, target band, inverse flag → on/warn/off
function evalTarget(value,band,inverse){
  if(value==null||!band)return'idle';
  const[lo,hi]=band;
  if(inverse){
    // lower is better
    if(value<=hi)return value<=lo?'on':'warn'; // within band is good; below lo = excellent
    if(value<=hi*1.15)return'warn';
    return'off';
  }
  // higher is better
  if(value>=lo)return value<=hi?'on':'on'; // hit lo or better
  if(value>=lo*0.85)return'warn';
  return'off';
}
function bandLabel(band,fmt){if(!band)return'—';const[lo,hi]=band;return fmt==='%'?`${lo}–${hi}%`:fmt==='x'?`${lo}–${hi}x`:fmt==='mo'?`${lo}–${hi} mo`:fmt==='L'?`${inrL(lo)} → ${inrL(hi)}`:`${inr(lo)} – ${inr(hi)}`;}
function pctToTarget(value,band,inverse){if(value==null||!band)return 0;const[lo,hi]=band;if(inverse){if(value<=lo)return 100;if(value>=hi*1.5)return 0;return Math.max(0,Math.min(100,100-((value-lo)/(hi*1.5-lo))*100));}else{if(value>=hi)return 100;if(value<=0)return 0;return Math.max(0,Math.min(100,(value/lo)*100));}}

// ── TAPG = Target / Achieved / Pending / Gap (the four-question framework) ──
// For ratio metrics (ROAS, CPA, AOV, CTR, Frequency): target is a threshold, pending = improvement needed, gap = signed % deviation from target
// For cumulative metrics (Spend, Revenue, Orders): target is a total goal over the period, pending = remaining work, gap = ahead/behind pace
function tapg({target,achieved,inverse=false,cumulative=false,band=null}){
  // status against band if provided, else against single target
  let status='idle',pending=null,gap=null,gapPct=null;
  if(achieved==null||target==null)return{target,achieved,pending,gap,gapPct,status};
  if(cumulative){
    pending=Math.max(0,target-achieved);
    gap=achieved-target;  // positive=ahead, negative=behind
    gapPct=target>0?+(gap/target*100).toFixed(1):null;
    if(achieved>=target)status='on';
    else if(achieved>=target*0.85)status='warn';
    else status='off';
  }else if(inverse){
    // lower is better (CPA, frequency, cancel rate)
    pending=achieved>target?+(achieved-target).toFixed(2):0;
    gap=target-achieved;  // positive=under cap=good
    gapPct=target>0?+((target-achieved)/target*100).toFixed(1):null;
    if(band){const[lo,hi]=band;if(achieved<=lo)status='on';else if(achieved<=hi)status='warn';else status='off';}
    else{if(achieved<=target)status='on';else if(achieved<=target*1.15)status='warn';else status='off';}
  }else{
    // higher is better (ROAS, AOV, CTR)
    pending=achieved<target?+(target-achieved).toFixed(2):0;
    gap=achieved-target;  // positive=above target=good
    gapPct=target>0?+((achieved-target)/target*100).toFixed(1):null;
    if(band){const[lo,hi]=band;if(achieved>=hi)status='on';else if(achieved>=lo)status='warn';else status='off';}
    else{if(achieved>=target)status='on';else if(achieved>=target*0.85)status='warn';else status='off';}
  }
  return{target,achieved,pending,gap,gapPct,status};
}

// Number of days in the current selected date range (for cumulative pace calcs)
function daysInRange(dailyData){if(!dailyData?.length)return 1;return dailyData.length;}

// Status visual helpers
const stColor=s=>({on:'text-emerald-400',warn:'text-amber-400',off:'text-red-400',idle:'text-stone-500'}[s]||'text-stone-500');

// ── Meta API ────────────────────────────────────────────────────────────
function findConv(row,type,src='actions'){
  for(const s of[src,'conversions','unique_actions']){const arr=row?.[s];if(!Array.isArray(arr))continue;for(const v of[type,`offsite_conversion.fb_pixel_${type}`,`website_${type}`]){const it=arr.find(a=>a.action_type===v);if(it){const x=parseFloat(it.value||0);if(x>0)return x;}}}return 0;
}
function buildKpis(row){
  if(!row)return{spend:0,revenue:0,purchases:0,roas:null,cpa:null,aov:null,impressions:0,linkClicks:0,ctr:null,cpc:null,lpv:0,vc:0,atc:0,ic:0,frequency:0,icToPurchase:null,hookRate:null,thruRate:null};
  const spend=parseFloat(row.spend||0),impr=parseInt(row.impressions||0);
  const clicks=parseInt(row.inline_link_clicks||0)||findConv(row,'link_click');
  const lpv=findConv(row,'landing_page_view'),vc=findConv(row,'view_content');
  const atc=findConv(row,'add_to_cart'),ic=findConv(row,'initiate_checkout');
  const p=findConv(row,'purchase'),rev=findConv(row,'purchase','action_values');
  const vid=findConv(row,'video_view'),thru=findConv(row,'video_thruplay_watched_actions');
  return{spend:Math.round(spend),revenue:Math.round(rev),purchases:p,
    roas:spend>0?+(rev/spend).toFixed(2):null,cpa:p>0?Math.round(spend/p):null,aov:p>0?Math.round(rev/p):null,
    impressions:impr,linkClicks:clicks,frequency:parseFloat(row.frequency||0),
    ctr:impr>0?+((clicks/impr)*100).toFixed(2):null,cpc:clicks>0?Math.round(spend/clicks):null,
    lpv,vc,atc,ic,icToPurchase:ic>0?+((p/ic)*100).toFixed(1):null,
    hookRate:impr>0&&vid>0?+((vid/impr)*100).toFixed(1):null,
    thruRate:vid>0?+((thru/vid)*100).toFixed(1):null};
}
function slotFor(name){if(!name)return null;const m=name.toUpperCase().match(/^(C\d+)[_\s\-·]/);return m&&SLOT_MAP[m[1]]?m[1]:null;}
async function metaGet(token,path,params){const r=await fetch(`${BASE}/${path}?${params}&access_token=${token}`);const d=await r.json();if(d.error)throw new Error(d.error.message||'Meta API error');return d;}
async function fetchAll(token,dateQ){
  const[camps,acct,ci,daily,campDaily]=await Promise.all([
    metaGet(token,`act_${ACCOUNT_ID}/campaigns`,`fields=id,name,status,effective_status,daily_budget,lifetime_budget,start_time,objective&limit=100`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=${FIELDS}&${dateQ}&${ATTR}`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=campaign_id,campaign_name,${FIELDS}&level=campaign&${dateQ}&${ATTR}&limit=50`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=${FIELDS}&${dateQ}&${ATTR}&time_increment=1&limit=90`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=campaign_id,campaign_name,${FIELDS}&level=campaign&${dateQ}&${ATTR}&time_increment=1&limit=500`),
  ]);
  const acctK=buildKpis((acct.data||[])[0])||{};
  const im={};(ci.data||[]).forEach(r=>{im[r.campaign_id]=r;});
  const dailyData=(daily.data||[]).map(r=>({date:r.date_start,...buildKpis(r)}));
  const campaignDaily={};
  (campDaily.data||[]).forEach(r=>{const k=buildKpis(r);if(!campaignDaily[r.campaign_id])campaignDaily[r.campaign_id]=[];campaignDaily[r.campaign_id].push({date:r.date_start,...k});});
  Object.keys(campaignDaily).forEach(id=>campaignDaily[id].sort((a,b)=>a.date.localeCompare(b.date)));
  const campaigns=(camps.data||[]).filter(c=>c.effective_status!=='DELETED').map(c=>{
    const k=buildKpis(im[c.id]);const slot=slotFor(c.name);const cfg=slot?SLOT_MAP[slot]:null;
    const eff=c.effective_status;const spend=k.spend||0;let status='active';
    if(['PAUSED','CAMPAIGN_PAUSED'].includes(eff))status='paused';
    else if(['DISAPPROVED','POLICY_VIOLATION'].includes(eff))status='disapproved';
    else if(!im[c.id]||spend===0)status='active_no_spend';
    else if(cfg&&spend>cfg.killSpend&&k.roas!==null&&k.roas<cfg.killRoas)status='kill';
    return{id:c.id,name:c.name,slot,effectiveStatus:eff,dailyBudget:c.daily_budget?Math.round(parseInt(c.daily_budget)/100):null,startTime:c.start_time,objective:c.objective,status,daily:campaignDaily[c.id]||[],...k};
  }).sort((a,b)=>(b.spend||0)-(a.spend||0));
  return{syncedAt:new Date().toISOString(),...acctK,campaigns:campaigns.filter(c=>c.slot),unmappedCampaigns:campaigns.filter(c=>!c.slot),dailyData,campaignDaily};
}
async function fetchDetail(token,campaignId,dateQ){
  const filter=encodeURIComponent(JSON.stringify([{field:'campaign.id',operator:'EQUAL',value:campaignId}]));
  const[sa,ai,adi,sads]=await Promise.all([
    metaGet(token,`${campaignId}/adsets`,`fields=id,name,daily_budget,status,effective_status&limit=50`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=adset_id,adset_name,${FIELDS}&level=adset&${dateQ}&${ATTR}&filtering=${filter}&limit=50`),
    metaGet(token,`act_${ACCOUNT_ID}/insights`,`fields=ad_id,ad_name,adset_id,${FIELDS}&level=ad&${dateQ}&${ATTR}&filtering=${filter}&limit=100`),
    metaGet(token,`${campaignId}/ads`,`fields=id,name,adset_id,status,effective_status,review_feedback&limit=100`),
  ]);
  const aim={};(ai.data||[]).forEach(r=>{aim[r.adset_id]=r;});
  const adim={};(adi.data||[]).forEach(r=>{adim[r.ad_id]=r;});
  const allI=(adi.data||[]).reduce((s,r)=>s+parseInt(r.impressions||0),0);
  const allC=(adi.data||[]).reduce((s,r)=>s+(parseInt(r.inline_link_clicks||0)||findConv(r,'link_click')),0);
  const avgCtr=allI>0?(allC/allI)*100:1.5;
  const adsets=(sa.data||[]).map(a=>{

function adsetRec(a,all){

  return{level:'watch',text:`CTR ${a.ctr||0}%, CPC ₹${Math.round(a.cpc||0)}. Monitor 48h.`};
}
function adVerdict(k,avgCtr){

}
function adRec(ad,avgCtr){

  if(ad.verdict==='blocked')return{level:'blocked',title:'Stuck in review',text:'Over 48h in review. Duplicate with simpler creative.',unit:null};
  if(ad.verdict==='small')return{level:'wait',title:'Insufficient data',text:`${ad.impressions} impressions — need 300+ for verdict.`,unit:null};
  if(ad.verdict==='promising')return{level:'promising',title:'Promising — Strong hook',text:`Hook rate ${ad.hookRate?.toFixed(0)}% (benchmark 25%+). Give 3 more days.`,unit:a5?`Need AOV ≥${inr(a5)} for 5x ROAS.`:null};

  return{level:'watch',title:'Monitoring',text:`CTR ${ad.ctr||0}%, CPC ${inr(ad.cpc)}. ${(ad.impressions||0)>500?'Make a call in 48h.':`${Math.max(0,500-(ad.impressions||0))} more impressions needed.`}`,unit:null};
}

// ── PROFITABILITY MATH (NEW) ───────────────────────────────────────────
// Contribution Margin = Revenue × GM − Ad Spend − Shipping × orders
// GPAS = Revenue − Ad Spend
// CAC = spend / new purchases (approx == cpa for prospecting-heavy mix)
// LTV(90d est.) = AOV × GM × (1 + estRepeatFactor)
function calcProfitability(data){
  if(!data)return null;
  const rev=data.revenue||0,spend=data.spend||0,orders=data.purchases||0;
  const gm=BUSINESS.GM;
  const shippingTotal=orders*BUSINESS.SHIP_COST;
  const cogs=Math.round(rev*(1-gm));
  const cm=Math.round(rev*gm-spend-shippingTotal);
  const gpas=Math.round(rev-spend);
  const cmPerOrder=orders>0?Math.round((rev*gm-shippingTotal)/orders-spend/orders):null;
  const cmPctRev=rev>0?+(cm/rev*100).toFixed(1):null;
  return{rev,spend,orders,cogs,shippingTotal,cm,gpas,cmPerOrder,cmPctRev,gm};
}
function calcLtvCac(data){
  if(!data||!data.aov||!data.cpa)return null;
  const aov=data.aov,cac=data.cpa,gm=BUSINESS.GM,ship=BUSINESS.SHIP_COST;
  const contribPerOrder=Math.round(aov*gm-ship);
  // estimated 90d LTV: assume 1.15 orders per customer in first 90d (conservative for fashion)
  const repeatFactor90=1.15;
  const ltv90=Math.round(contribPerOrder*repeatFactor90);
  // monthly contribution per customer at 1.5 orders/year = 0.125 orders/mo
  const monthlyContrib=contribPerOrder*0.125;
  const paybackMo=monthlyContrib>0?+(cac/monthlyContrib).toFixed(1):null;
  const ltvCacRatio=cac>0?+(ltv90/cac).toFixed(2):null;
  return{aov,cac,contribPerOrder,ltv90,monthlyContrib:Math.round(monthlyContrib),paybackMo,ltvCacRatio,repeatFactor90};
}

// ── PHASE / TARGETS HELPERS ────────────────────────────────────────────
function currentPhase(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  const dn=Math.max(1,Math.floor((now-PHASE1_START)/86400000)+1);
  const pi=dn<=30?0:dn<=60?1:2;
  return{phaseIdx:pi,phaseNo:pi+1,dayN:dn,phase:PHASES[pi],dayOfPhase:pi===0?dn:pi===1?dn-30:dn-60};
}
function getBandForPhase(kpi,phaseNo){return kpi['p'+phaseNo]||null;}

// Compute "actual" for each KPI from Meta data, falling back to baseline/null for Shopify-sourced
function computeActuals(data){
  if(!data)return{};
  const profit=calcProfitability(data);
  const ltvcac=calcLtvCac(data);
  return{
    mer:data.roas,
    ncRoas:data.roas, // approx — true NC-ROAS needs prospecting-only split. Refined elsewhere.
    aov:data.aov,
    cac:data.cpa,
    cacPayback:ltvcac?.paybackMo,
    repeatRate:null,                                       // Shopify
    contribMargin:profit?.cm,
    prepaidMix:null,                                       // Shopify
    cancelRate:null,                                       // Shopify
    discountPct:null,                                      // Shopify
    clickToSession:data.impressions>0&&data.linkClicks>0&&data.lpv>0?+((data.lpv/data.linkClicks)*100).toFixed(1):null,
    bundleAttach:null,                                     // Shopify
    refundRate:null,                                       // Shopify
    frequency:data.frequency
  };
}

  if(heroAds.length>0){const h=heroAds.find(a=>a.verdict==='hero')||heroAds[0];const b=bestAs?.dailyBudget?Math.round(bestAs.dailyBudget*0.6):3000;tasks.push({sev:'amber',phase:'next48',n:5,title:'Scale hero ad in its own adset',steps:[`Meta: find "${h.name}" → duplicate`,`NEW adset — same targeting, budget ₹${b.toLocaleString('en-IN')}/day`,'Add ONLY this ad to the new adset','Brief 2 hook variants alongside it — keep Core Pair URL'],protect:`CTR ${h.ctr}%, CPC ${inr(h.cpc)} — 2x better than avg. Solo budget prevents competing for delivery.`,verify:`New adset CPC within 20% of ${inr(h.cpc)} after 3 days`});}

// 2) UNDERPERFORMANCE FLAGS ────────────────────────────────────────────
function UnderperformanceFlags({data,actuals,phaseInfo,campaigns}){
  const flags=[];const{phaseNo}=phaseInfo;
  Object.entries(KPI_TARGETS).forEach(([k,kpi])=>{
    const band=getBandForPhase(kpi,phaseNo);
    const actual=actuals[k];
    const st=evalTarget(actual,band,kpi.inverse);
    if(st==='off'||st==='warn'){
      const reasons={
        mer:'Account-level blended ROAS below phase target. Until MER ≥ phase target, every rupee of scale loses contribution.',
        ncRoas:'New-customer ROAS suppressed — paid acquisition not yet profitable at first order. Repeat-rate engine must catch up.',
        aov:'AOV under target — Core Pair (₹7,800) URL not landing enough orders. Audit ad destinations.',
        cac:'CAC above ceiling. Either CPM is high (refresh creatives) or CTR/CVR is leaking (LP audit).',
        cacPayback:'Payback months longer than phase ceiling. Either AOV too low or CAC too high.',
        contribMargin:'Contribution margin below phase target. The single most important number on this page.',
        clickToSession:'Massive click-to-session loss. LP load speed / mobile / pixel fire are the suspects.',
        frequency:'Account frequency above 2.5x. Creative fatigue — refresh queue.'
      };
      flags.push({k,kpi,band,actual,st,why:reasons[k]||`${kpi.label} outside target band.`});
    }
  });
  // Campaign-level flags
  (campaigns||[]).forEach(c=>{
    if(c.status==='kill'){flags.push({k:c.slot,kpi:{label:`${c.slot} — Kill rule violation`,fmt:'x'},band:[c.roas,c.roas],actual:c.roas,st:'off',why:`Campaign ${c.slot} at ${c.roas}x ROAS after ${inr(c.spend)} spend — below kill threshold. Pause now.`});}
    if(c.frequency>2.7&&c.spend>5000){flags.push({k:c.slot+'_freq',kpi:{label:`${c.slot} — Frequency creep`,fmt:'x'},band:[0,2.5],actual:c.frequency,st:'warn',why:`Frequency ${c.frequency.toFixed(2)}x on ${c.name}. Brief 2 new creatives before it hits 3.5x death-spiral.`});}
  });
  if(!flags.length)return null;
  return(<div className="mb-3 card border-l-2 !border-l-red-700">
    <div className="px-4 py-3 border-b border-stone-800/40 flex items-center justify-between">
      <div className="flex items-center gap-3"><span className="text-base">⚠</span><div><div className="sec-hd">Underperformance Flags · Phase {phaseNo}</div><div className="text-sm font-bold text-stone-100 mt-0.5">{flags.length} metric{flags.length>1?'s':''} missing target</div></div></div>
      <span className="chip off">{flags.filter(f=>f.st==='off').length} below · {flags.filter(f=>f.st==='warn').length} at-risk</span>
    </div>
    <div className="divide-y divide-stone-800/30">
      {flags.slice(0,8).map((f,i)=>(<div key={i} className="px-4 py-2.5 flex items-start gap-3">
        <span className={`flag-dot ${f.st} mt-1.5 flex-shrink-0`}/>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap"><span className="text-sm font-semibold text-stone-100">{f.kpi.label}</span><span className={`mono text-xs font-bold ${f.st==='off'?'text-red-400':'text-amber-400'}`}>{fmtKpi(f.actual,f.kpi.fmt)}</span><span className="text-[10px] text-stone-600 mono">target {bandLabel(f.band,f.kpi.fmt)}</span></div>
          <div className="text-[11px] text-stone-400 mt-0.5 leading-snug">{f.why}</div>
        </div>
      </div>))}
      {flags.length>8&&<div className="px-4 py-2 text-[10px] text-stone-600 text-center">+ {flags.length-8} more</div>}
    </div>
  </div>);
}

// Margin waterfall SVG ──────────────────────────────────────────────────
function MarginWaterfall({profit}){
  const W=760,H=180,P=20;
  const segs=[
    {l:'Revenue',v:profit.rev,t:'add',col:'#10b981'},
    {l:'COGS',v:-profit.cogs,t:'sub',col:'#f59e0b'},
    {l:'Ad Spend',v:-profit.spend,t:'sub',col:'#f87171'},
    {l:'Shipping',v:-profit.shippingTotal,t:'sub',col:'#fb923c'},
    {l:'Contribution',v:profit.cm,t:'total',col:profit.cm>=0?'#10b981':'#ef4444'}
  ];
  const maxV=Math.max(profit.rev,Math.abs(profit.cm))||1;
  const scale=(H-60)/maxV;
  let cum=0;
  const bars=segs.map((s,i)=>{
    if(s.t==='total'){const y=H-30-Math.max(0,s.v)*scale;const h=Math.abs(s.v)*scale;return{...s,x:P+i*((W-P*2)/segs.length),w:(W-P*2)/segs.length-12,y:s.v>=0?y:H-30,h};}
    const yStart=H-30-cum*scale;cum+=s.v;const yEnd=H-30-cum*scale;
    return{...s,x:P+i*((W-P*2)/segs.length),w:(W-P*2)/segs.length-12,y:Math.min(yStart,yEnd),h:Math.abs(yEnd-yStart)};
  });
  return(<svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:'200px'}}>
    <line x1={P} y1={H-30} x2={W-P} y2={H-30} stroke="#44403c" strokeWidth="1"/>
    {bars.map((b,i)=>(<g key={i}>
      <rect x={b.x} y={b.y} width={b.w} height={Math.max(b.h,2)} fill={b.col} opacity={b.t==='total'?0.9:0.7} rx="2"/>
      <text x={b.x+b.w/2} y={b.y-6} fill={b.col} fontSize="11" textAnchor="middle" fontFamily="IBM Plex Mono" fontWeight="600">{b.t==='total'?inrL(b.v):inrL(Math.abs(b.v))}</text>
      <text x={b.x+b.w/2} y={H-12} fill="#a8a29e" fontSize="10" textAnchor="middle">{b.l}</text>
    </g>))}
  </svg>);
}

function CampaignTAPGTable({cfg,data,days}){
  if(!data)return null;
  const rows=[];
  // Spend pace (cumulative)
  if(cfg.dailyBudget==null){
    // Use targetCpa × expected orders or killSpend as a proxy
  }
  const dailyBudget=data.dailyBudget||0;
  const expectedSpend=dailyBudget*days;
  if(expectedSpend>0){
    const r=tapg({target:expectedSpend,achieved:data.spend||0,cumulative:true});
    rows.push({label:'Spend (pace)',fmt:'₹',note:`${days}d × ₹${dailyBudget.toLocaleString('en-IN')}/day budget`,...r});
  }
  // ROAS — target = killRoas (floor), and phase target
  const phase=currentPhase().phase;
  const roasTarget=Math.max(cfg.killRoas,phase.target*0.9); // realistic per-campaign target
  rows.push({label:'ROAS',fmt:'x',note:`kill <${cfg.killRoas}x · phase floor ${phase.target}x`,...tapg({target:cfg.killRoas,achieved:data.roas})});
  // CPA — target = cfg.targetCpa (inverse)
  rows.push({label:'CPA',fmt:'₹',inverse:true,note:`ceiling ${inr(cfg.targetCpa)}`,...tapg({target:cfg.targetCpa,achieved:data.cpa,inverse:true})});
  // AOV — target = cfg.targetAov
  rows.push({label:'AOV',fmt:'₹',note:cfg.product==='trio'?`Trio anchor ₹10,950`:cfg.product==='core_pair'?`Core Pair anchor ₹7,800`:`mixed cart target`,...tapg({target:cfg.targetAov,achieved:data.aov})});
  // Orders (cumulative — expected = expectedSpend / targetCpa)
  if(expectedSpend>0){
    const expectedOrders=Math.max(1,Math.round(expectedSpend/cfg.targetCpa));
    rows.push({label:'Orders (pace)',fmt:'n',note:`at target CPA ${inr(cfg.targetCpa)}`,...tapg({target:expectedOrders,achieved:data.purchases||0,cumulative:true})});
  }
  // Revenue (cumulative — expected = expectedSpend × roasTarget)
  if(expectedSpend>0){
    const expectedRev=Math.round(expectedSpend*cfg.killRoas);
    rows.push({label:'Revenue (pace)',fmt:'₹',note:`expected at kill-floor ${cfg.killRoas}x`,...tapg({target:expectedRev,achieved:data.revenue||0,cumulative:true})});

function TimeSeriesChart({data,metric}){
  const W=820,H=260,P=44,PB=42; // wider; reserve bottom for x labels + more padding
  const pts=data.map(d=>({date:d.date,v:metric.accessor(d)})).filter(p=>p.v!=null);
  if(!pts.length)return<div className="text-stone-500 text-xs py-8 text-center">No data for this metric in the selected range.</div>;
  const vals=pts.map(p=>p.v);
  const mn=Math.min(0,...vals,metric.target||0,metric.kill||0);
  const mx=Math.max(...vals,metric.target||0,metric.kill||0)*1.15;
  const scale=v=>H-PB-((v-mn)/(mx-mn))*(H-P-PB);
  const xStep=pts.length>1?(W-P*2)/(pts.length-1):0;
  const x=i=>P+i*xStep;
  const path=pts.map((p,i)=>(i===0?'M':'L')+x(i)+','+scale(p.v)).join(' ');
  const area=path+` L${x(pts.length-1)},${scale(Math.max(0,mn))} L${x(0)},${scale(Math.max(0,mn))} Z`;
  const fmtV=(v,compact=false)=>{
    if(v==null)return'—';
    if(metric.fmt==='x')return Number(v).toFixed(2)+'x';
    if(metric.fmt==='%')return Number(v).toFixed(1)+'%';
    if(metric.fmt==='₹'){if(compact){const a=Math.abs(v);if(a>=100000)return(v<0?'−₹':'₹')+Math.abs(v/100000).toFixed(1)+'L';if(a>=1000)return(v<0?'−₹':'₹')+Math.abs(v/1000).toFixed(1)+'k';return inr(v);}return inr(v);}
    return num(v);
  };
  // Compact value formatter for inline labels (short)
  const fmtLabel=v=>fmtV(v,true);
  // How many value labels can we show without overlap? Approx 50px per label.
  const labelEvery=Math.max(1,Math.ceil(pts.length/12));
  const xTickStep=Math.max(1,Math.ceil(pts.length/8));
  return(<div style={{position:'relative'}}>
    <svg viewBox={`0 0 ${W} ${H+18}`} className="w-full" style={{maxHeight:'320px'}} preserveAspectRatio="xMidYMid meet">
      {/* Y axis grid */}
      {[0,0.25,0.5,0.75,1].map((p,i)=>{const y=P+p*(H-P-PB);const v=mx-p*(mx-mn);return(<g key={i}><line x1={P} y1={y} x2={W-P} y2={y} stroke="#292524" strokeWidth="1" strokeDasharray={i===0||i===4?'':'2,3'}/><text x={P-6} y={y+3} fill="#78716c" fontSize="9" textAnchor="end" fontFamily="IBM Plex Mono">{fmtLabel(v)}</text></g>);})}
      {/* Target band line */}
      {metric.target!=null&&<g><line x1={P} y1={scale(metric.target)} x2={W-P} y2={scale(metric.target)} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="5,3"/><rect x={W-P-92} y={scale(metric.target)-13} width="92" height="13" fill="#0d0c0b"/><text x={W-P-2} y={scale(metric.target)-3} fill="#f59e0b" fontSize="9.5" textAnchor="end" fontFamily="IBM Plex Mono" fontWeight="bold">target {fmtLabel(metric.target)}</text></g>}
      {metric.kill!=null&&<g><line x1={P} y1={scale(metric.kill)} x2={W-P} y2={scale(metric.kill)} stroke="#dc2626" strokeWidth="1" strokeDasharray="3,3"/><rect x={W-P-92} y={scale(metric.kill)+3} width="92" height="13" fill="#0d0c0b"/><text x={W-P-2} y={scale(metric.kill)+13} fill="#dc2626" fontSize="9.5" textAnchor="end" fontFamily="IBM Plex Mono" fontWeight="bold">{metric.inverse?'cap':'kill'} {fmtLabel(metric.kill)}</text></g>}
      {/* Area fill */}
      <path d={area} fill={metric.colour} opacity="0.10"/>
      {/* Line */}
      <path d={path} fill="none" stroke={metric.colour} strokeWidth="2.2" strokeLinejoin="round"/>
      {/* Points + inline value labels */}
      {pts.map((p,i)=>{
        const xx=x(i),yy=scale(p.v);
        const onTarget=metric.target!=null?(metric.inverse?p.v<=metric.target:p.v>=metric.target):true;
        const ringCol=onTarget?metric.colour:'#ef4444';
        // Place label above or below depending on position relative to mid
        const labelAbove=yy>(P+(H-P-PB)*0.45);
        const ly=labelAbove?yy-9:yy+15;
        const showLabel=(i%labelEvery===0)||i===pts.length-1||i===0;
        return(<g key={i}>
          <circle cx={xx} cy={yy} r="3.5" fill={ringCol} stroke="#0d0c0b" strokeWidth="1.5"/>
          {showLabel&&<g>
            <rect x={xx-22} y={ly-9} width="44" height="13" fill="#0d0c0b" opacity="0.85" rx="2"/>
            <text x={xx} y={ly+1} fill={onTarget?'#e7e5e4':'#fca5a5'} fontSize="9.5" textAnchor="middle" fontFamily="IBM Plex Mono" fontWeight="bold">{fmtLabel(p.v)}</text>
          </g>}
        </g>);
      })}
      {/* X-axis labels */}
      {pts.map((p,i)=>{if(i%xTickStep!==0&&i!==pts.length-1)return null;const dt=new Date(p.date+'T12:00:00');return(<text key={i} x={x(i)} y={H+12} fill="#78716c" fontSize="9" textAnchor="middle" fontFamily="IBM Plex Mono">{dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</text>);})}
      {/* Latest reading callout (right edge) */}
      {pts.length>0&&(()=>{const last=pts[pts.length-1];const xx=x(pts.length-1);const yy=scale(last.v);return(<g>
        <line x1={xx} y1={P} x2={xx} y2={H-PB} stroke={metric.colour} strokeWidth="0.5" strokeDasharray="2,3" opacity="0.4"/>
        <circle cx={xx} cy={yy} r="6" fill="none" stroke={metric.colour} strokeWidth="1.5" opacity="0.7"/>
      </g>);})()}
    </svg>
    {/* Latest + summary stat strip below chart */}
    <div className="mt-2 flex flex-wrap items-center justify-between gap-2 text-[10px] mono">
      <div className="flex items-center gap-3">
        <span className="text-stone-500">Latest <span className="text-stone-100 font-bold ml-1">{fmtLabel(pts[pts.length-1].v)}</span></span>
        <span className="text-stone-500">Avg <span className="text-stone-300 ml-1">{fmtLabel(vals.reduce((s,v)=>s+v,0)/vals.length)}</span></span>
        <span className="text-stone-500">Min <span className="text-stone-300 ml-1">{fmtLabel(Math.min(...vals))}</span></span>
        <span className="text-stone-500">Max <span className="text-stone-300 ml-1">{fmtLabel(Math.max(...vals))}</span></span>
      </div>
      {metric.target!=null&&<span className="text-stone-500">Days on target <span className="text-stone-100 font-bold ml-1">{pts.filter(p=>metric.inverse?p.v<=metric.target:p.v>=metric.target).length}/{pts.length}</span></span>}
    </div>
  </div>);
}

function StageAggregate({campaigns,metric,metricCfg}){
  if(!campaigns.length)return<div className="text-stone-500 text-xs">No campaign data yet.</div>;
  const groups=['prospecting','retargeting','reactivation'].map(t=>{
    const cs=campaigns.filter(c=>{const cfg=SLOT_MAP[c.slot];return cfg&&cfg.type===t;});
    const spend=cs.reduce((s,c)=>s+(c.spend||0),0);
    const rev=cs.reduce((s,c)=>s+(c.revenue||0),0);
    const orders=cs.reduce((s,c)=>s+(c.purchases||0),0);
    const roas=spend>0?+(rev/spend).toFixed(2):null;
    const cpa=orders>0?Math.round(spend/orders):null;
    const aov=orders>0?Math.round(rev/orders):null;
    const cm=Math.round(rev*BUSINESS.GM-spend-orders*BUSINESS.SHIP_COST);
    return{type:t,spend,rev,orders,roas,cpa,aov,cm,count:cs.length};
  });
  const total={spend:groups.reduce((s,g)=>s+g.spend,0),rev:groups.reduce((s,g)=>s+g.rev,0),orders:groups.reduce((s,g)=>s+g.orders,0)};
  const valFor=(g)=>{switch(metric){case'roas':return g.roas;case'spend':return g.spend;case'revenue':return g.rev;case'cm':return g.cm;case'cpa':return g.cpa;case'aov':return g.aov;case'purchases':return g.orders;default:return null;}};
  const fmtV=v=>v==null?'—':metricCfg.fmt==='₹'?inr(v):metricCfg.fmt==='x'?v.toFixed(2)+'x':num(v);
  const stageLabel={prospecting:'PROSPECTING',retargeting:'RETARGETING',reactivation:'REACTIVATION'};
  const stageCol={prospecting:'#60a5fa',retargeting:'#fbbf24',reactivation:'#34d399'};
  const maxV=Math.max(...groups.map(g=>{const v=valFor(g);return v!=null?Math.abs(v):0;}));
  return(<div className="space-y-2">
    {groups.map(g=>{const v=valFor(g);const w=maxV>0&&v!=null?(Math.abs(v)/maxV)*100:0;const pctSpend=total.spend>0?(g.spend/total.spend*100).toFixed(0):0;return(<div key={g.type} className="flex items-center gap-3">
      <div className="w-28 flex-shrink-0"><div className="text-[10px] font-bold text-stone-300">{stageLabel[g.type]}</div><div className="text-[9px] text-stone-600 mono">{g.count} camp · {pctSpend}% spend</div></div>
      <div className="flex-1 h-7 bg-stone-950/60 relative rounded-sm overflow-hidden"><div className="h-full rounded-sm" style={{width:Math.max(w,2)+'%',background:stageCol[g.type],opacity:0.7}}/><div className="absolute inset-0 flex items-center px-2"><span className="mono text-[11px] font-bold text-stone-100">{fmtV(v)}</span></div></div>
      <div className="w-32 flex-shrink-0 text-right text-[10px] mono text-stone-500">{inr(g.spend)} → {inr(g.rev)}</div>
    </div>);})}
  </div>);
}

// Plan Compliance
function PlanCompliance({campaigns,unmapped,dailyData}){
  const[open,setOpen]=useState(true);
  const{phaseNo:_pn,dayOfPhase:_pd,phase:ph,dayN:dn}=currentPhase();
  const pd=_pd;
  const l7=dailyData?.filter(d=>d.spend>0).slice(-7)||[];
  const ts=l7.reduce((s,d)=>s+(d.spend||0),0),tr=l7.reduce((s,d)=>s+(d.revenue||0),0);
  const t7=ts>0?+(tr/ts).toFixed(2):null;
  const slotMap=Object.fromEntries((campaigns||[]).map(c=>[c.slot,c]));
  const slotItems=SLOTS.map(s=>{
    const c=slotMap[s.slot];const eff=c?.effectiveStatus;
    const isActive=eff==='ACTIVE'&&(c?.spend||0)>0;const isPaused=eff==='PAUSED';
    const shouldBeActive=pd>=s.launchDay;let st='not_launched',stC='text-stone-600';
    if(isActive){st='active';stC='text-emerald-400';}else if(isPaused){st='paused';stC='text-amber-400';}
    return{...s,c,st,stC,compliance:isActive?'ok':shouldBeActive?'overdue':'pending',shouldBeActive};
  });
  const overdueSlots=slotItems.filter(s=>s.compliance==='overdue');
  const killViol=(campaigns||[]).filter(c=>c.status==='kill');
  const legacyZero=(unmapped||[]).filter(c=>c.effectiveStatus==='ACTIVE'&&(c.spend||0)>500&&(!c.roas||c.roas<0.5));
  const checks=[
    {k:'roas',l:'7-day ROAS vs Phase target',target:ph.target+'x',actual:t7!==null?t7+'x':'—',ok:t7!==null&&t7>=ph.target,warn:t7!==null&&t7>=ph.kill,detail:t7!==null?t7>=ph.target?`Ahead +${(t7-ph.target).toFixed(2)}x`:`Behind -${(ph.target-t7).toFixed(2)}x`:'No data yet'},
    {k:'slots',l:'C-slot activation (Day '+pd+')',target:slotItems.filter(s=>s.shouldBeActive).length+' due',actual:slotItems.filter(s=>s.st==='active').length+' active',ok:overdueSlots.length===0,warn:overdueSlots.length<=2,detail:overdueSlots.length===0?'All due slots launched':overdueSlots.map(s=>s.slot).join(', ')+' overdue'},
    {k:'kill',l:'Kill rule compliance',target:'0 violations',actual:killViol.length+' violation'+(killViol.length!==1?'s':''),ok:killViol.length===0,warn:false,detail:killViol.length===0?'All within kill thresholds':killViol.map(c=>`${c.slot} ${c.roas}x`).join(', ')},
    {k:'legacy',l:'Legacy bleed',target:'0 zero-ROAS active',actual:legacyZero.length+' bleeding',ok:legacyZero.length===0,warn:legacyZero.length<=2,detail:legacyZero.length===0?'No zero-ROAS campaigns spending':legacyZero.length+' campaigns with ROAS <0.5x still spending'},
  ];
  const score=checks.filter(i=>i.ok).length;const total=checks.length;
  const oC=score===total?'text-emerald-400':score>=total-1?'text-amber-400':'text-red-400';
  return(<div className="card mb-3">
    <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-white/[.02] select-none" onClick={()=>setOpen(!open)}>
      <div className="flex items-center gap-3 min-w-0">
        <div className="flex-shrink-0"><div className="sec-hd">Plan Compliance · Phase {ph.n}</div><div className="flex items-baseline gap-1.5 mt-0.5"><span className={`text-xl font-bold mono ${oC}`}>{score}/{total}</span><span className="text-stone-500 text-xs ml-1">checks</span></div></div>
        <div className="hidden sm:flex items-center gap-1.5">{checks.map(it=>(<div key={it.k} className={`w-2 h-2 rounded-full ${it.ok?'bg-emerald-500':it.warn?'bg-amber-500':'bg-red-500'}`} title={it.l}/>))}</div>
      </div>
      <div className="flex items-center gap-4 flex-shrink-0">
        <div className="text-right hidden sm:block"><div className="sec-hd">Day {pd} of {ph.days}</div><div className={`mono text-sm font-bold ${t7>=ph.target?'text-emerald-400':t7>=ph.kill?'text-amber-400':t7>0?'text-red-400':'text-stone-500'}`}>{t7!==null?t7+'x':'—'}</div></div>
        <div className="text-right hidden sm:block"><div className="sec-hd">Target</div><div className="mono text-sm font-bold text-stone-500">{ph.target}x</div></div>
        <span className="text-stone-600">{open?'▲':'▼'}</span>
      </div>
    </div>
    {open&&(<div className="border-t border-stone-800/40 p-4 sd">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mb-4">
        {checks.map(it=>(<div key={it.k} className={`px-3 py-2.5 border rounded-sm ${it.ok?'border-emerald-900/50 bg-emerald-950/10':it.warn?'border-amber-900/50 bg-amber-950/10':'border-red-900/50 bg-red-950/10'}`}>
          <div className="flex items-start justify-between gap-2">
            <div className="min-w-0"><div className="text-[10px] text-stone-500 mb-1 leading-tight">{it.l}</div><div className="flex items-baseline gap-1.5 flex-wrap"><span className={`mono text-sm font-bold ${it.ok?'text-emerald-400':it.warn?'text-amber-400':'text-red-400'}`}>{it.actual}</span><span className="text-[9px] text-stone-600">/ {it.target}</span></div></div>
            <span className={`text-base flex-shrink-0 ${it.ok?'text-emerald-500':it.warn?'text-amber-500':'text-red-500'}`}>{it.ok?'✓':it.warn?'△':'✕'}</span>
          </div>
          <div className={`text-[10px] mt-1.5 leading-snug ${it.ok?'text-emerald-600':it.warn?'text-amber-600':'text-red-400'}`}>{it.detail}</div>
        </div>))}
      </div>
      <div className="sec-hd mb-2">C-slot activation status · Day {pd}</div>
      <div className="grid grid-cols-3 gap-1.5" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <style>{`@media(min-width:480px){.cs-grid{grid-template-columns:repeat(5,1fr)!important;}}@media(min-width:900px){.cs-grid{grid-template-columns:repeat(9,1fr)!important;}}`}</style>
        {slotItems.map(s=>(<div key={s.slot} className={`cs-grid px-1.5 py-2 border rounded-sm text-center ${s.st==='active'?'border-emerald-900/50 bg-emerald-950/10':s.compliance==='overdue'?'border-red-900/50 bg-red-950/10':'border-stone-800/40 bg-stone-950/20'}`}>
          <div className="text-[9px] font-bold text-stone-500">{s.slot}</div>
          <div className={`text-[8px] font-bold mt-0.5 ${s.stC}`}>{s.st==='active'?'ACTIVE':s.st==='paused'?'PAUSED':'—'}</div>
          {s.compliance==='overdue'&&<div className="text-[7px] text-red-500 mt-0.5">OVERDUE</div>}
          {s.compliance==='pending'&&<div className="text-[7px] text-stone-700 mt-0.5">day {s.launchDay}+</div>}
        </div>))}
      </div>
      {killViol.length>0&&(<div className="mt-3 px-3 py-2.5 border border-red-900/50 bg-red-950/10 rounded-sm">
        <div className="text-[10px] font-bold text-red-400 mb-2">KILL RULE VIOLATIONS</div>
        {killViol.map(c=>(<div key={c.id} className="flex flex-wrap items-center justify-between gap-2 py-1 border-b border-red-900/20 last:border-0">
          <span className="text-xs text-stone-300 truncate max-w-[55%]">{c.slot}: {c.name}</span>
          <div className="flex items-center gap-3 text-[11px]"><span className="mono text-red-400">{c.roas}x</span><span className="mono text-stone-500">{inr(c.spend)}</span><span className="text-red-400 font-bold">PAUSE NOW</span></div>
        </div>))}
      </div>)}
    </div>)}
  </div>);
}

function ActionPlanView({tasks}){

  const groups=[{k:'today',l:'Today — stop the bleeding',b:'0–24 HOURS'},{k:'next48',l:'Next 48h — tighten',b:'1–2 DAYS'},{k:'week1',l:'Day 3–7 — kill rules',b:'3–7 DAYS'}].map(g=>({...g,tasks:tasks.filter(t=>t.phase===g.k)})).filter(g=>g.tasks.length>0);

function CampaignCard({cfg,data,onExpand,days}){
  const has=data&&data.effectiveStatus==='ACTIVE'&&(data.spend||0)>0;
  const isKill=data?.status==='kill';
  const st=!data?'NOT LAUNCHED':has?data.effectiveStatus:data.effectiveStatus==='ACTIVE'?'NO DELIVERY':data.effectiveStatus;
  const sc=isKill?'text-red-400':has?'text-emerald-400':!data?'text-stone-700':'text-stone-500';
  // Build 3 most-important TAPG rows for the card
  const expectedSpend=data?(data.dailyBudget||0)*days:0;
  const roasR=tapg({target:cfg.killRoas,achieved:data?.roas});
  const cpaR=tapg({target:cfg.targetCpa,achieved:data?.cpa,inverse:true});
  const spendR=expectedSpend>0?tapg({target:expectedSpend,achieved:data?.spend||0,cumulative:true}):null;
  // Overall card status
  const statuses=[roasR.status,cpaR.status,spendR?.status].filter(s=>s&&s!=='idle');
  const cardSt=statuses.includes('off')?'off':statuses.includes('warn')?'warn':statuses.includes('on')?'on':'idle';
  const borderCol=isKill?'border-red-800/60':cardSt==='off'?'border-red-900/40':cardSt==='warn'?'border-amber-900/40':cardSt==='on'?'border-stone-700/50':'border-stone-800/40';
  const bgCol=isKill?'bg-red-950/10':cardSt==='off'?'bg-red-950/5':cardSt==='warn'?'bg-amber-950/5':has?'bg-stone-900/40':'bg-stone-950/40';
  const fmtX=v=>v==null?'—':v.toFixed(2)+'x';
  const fmtRu=v=>v==null?'—':inr(v);
  return(<div onClick={()=>data&&onExpand()} className={`border rounded-sm cursor-pointer transition-all duration-100 hover:border-stone-500 active:scale-[.98] ${borderCol} ${bgCol} ${!data?'opacity-35 cursor-default':''}`}>
    <div className="p-2.5">
      <div className="flex items-center justify-between mb-1"><div className="flex items-center gap-1.5"><span className="text-[10px] font-bold text-stone-300 mono">{cfg.slot}</span>{cfg.product==='core_pair'&&<span className="text-[7px] text-amber-500 font-bold uppercase">CP</span>}{cfg.product==='trio'&&<span className="text-[7px] text-emerald-500 font-bold uppercase">TR</span>}</div><span className={`flag-dot ${cardSt}`} title={stLabel(cardSt)}/></div>
      <div className="text-[9px] text-stone-500 leading-snug mb-2 line-clamp-2 min-h-[24px]">{cfg.name}</div>
      <div className={`text-[8px] uppercase font-bold tracking-wider mb-1.5 ${sc}`}>{st}</div>
      {/* 4-column mini TAPG for ROAS, CPA, Spend-pace */}
      <div className="space-y-1.5 mt-1.5">
        {/* ROAS */}
        <div>
          <div className="flex items-center justify-between text-[8px] uppercase tracking-widest text-stone-600 mono"><span>ROAS</span><span className={stColor(roasR.status)}>{stLabel(roasR.status)}</span></div>
          <div className="grid grid-cols-4 gap-1 mt-0.5 text-[10px] mono leading-tight">
            <div><div className="text-stone-700 text-[7px]">TGT</div><div className="text-stone-400">{fmtX(cfg.killRoas)}</div></div>
            <div><div className="text-stone-700 text-[7px]">ACT</div><div className={`font-bold ${stColor(roasR.status)}`}>{fmtX(roasR.achieved)}</div></div>
            <div><div className="text-stone-700 text-[7px]">PND</div><div className="text-stone-500">{roasR.pending==null?'—':roasR.pending===0?'0':'+'+roasR.pending.toFixed(2)}</div></div>
            <div><div className="text-stone-700 text-[7px]">GAP</div><div className={`font-bold ${stColor(roasR.status)}`}>{roasR.gapPct==null?'—':(roasR.gapPct>=0?'+':'')+roasR.gapPct+'%'}</div></div>
          </div>
        </div>
        {/* CPA */}
        <div>
          <div className="flex items-center justify-between text-[8px] uppercase tracking-widest text-stone-600 mono"><span>CPA</span><span className={stColor(cpaR.status)}>{stLabel(cpaR.status)}</span></div>
          <div className="grid grid-cols-4 gap-1 mt-0.5 text-[10px] mono leading-tight">
            <div><div className="text-stone-700 text-[7px]">TGT</div><div className="text-stone-400">{fmtRu(cfg.targetCpa)}</div></div>
            <div><div className="text-stone-700 text-[7px]">ACT</div><div className={`font-bold ${stColor(cpaR.status)}`}>{fmtRu(cpaR.achieved)}</div></div>
            <div><div className="text-stone-700 text-[7px]">OVR</div><div className="text-stone-500">{cpaR.pending==null?'—':cpaR.pending===0?'0':'+'+inr(cpaR.pending)}</div></div>
            <div><div className="text-stone-700 text-[7px]">GAP</div><div className={`font-bold ${stColor(cpaR.status)}`}>{cpaR.gapPct==null?'—':(cpaR.gapPct>=0?'+':'')+cpaR.gapPct+'%'}</div></div>
          </div>
        </div>
        {/* Spend pace */}
        {spendR&&<div>
          <div className="flex items-center justify-between text-[8px] uppercase tracking-widest text-stone-600 mono"><span>Spend (pace)</span><span className={stColor(spendR.status)}>{stLabel(spendR.status)}</span></div>
          <div className="grid grid-cols-4 gap-1 mt-0.5 text-[10px] mono leading-tight">
            <div><div className="text-stone-700 text-[7px]">TGT</div><div className="text-stone-400">{fmtRu(expectedSpend)}</div></div>
            <div><div className="text-stone-700 text-[7px]">ACT</div><div className={`font-bold ${stColor(spendR.status)}`}>{fmtRu(spendR.achieved)}</div></div>
            <div><div className="text-stone-700 text-[7px]">PND</div><div className="text-stone-500">{spendR.pending==null?'—':spendR.pending===0?'0':inr(spendR.pending)}</div></div>
            <div><div className="text-stone-700 text-[7px]">GAP</div><div className={`font-bold ${stColor(spendR.status)}`}>{spendR.gapPct==null?'—':(spendR.gapPct>=0?'+':'')+spendR.gapPct+'%'}</div></div>
          </div>
        </div>}
      </div>
      <div className="mt-2 pt-1.5 border-t border-stone-800/40 flex justify-between text-[9px] mono text-stone-600"><span>{data?.purchases||0} orders · AOV {inr(data?.aov)}</span><span className="text-stone-500">tap →</span></div>
    </div>
  </div>);
}

function LegacyTable({campaigns,token,dateQ}){
  const[open,setOpen]=useState(false);const[search,setSearch]=useState('');const[filter,setFilter]=useState('all');const[sort,setSort]=useState({f:'spend',d:'desc'});
  const[expanded,setExpanded]=useState(null);const[detail,setDetail]=useState({});const[loading,setLoading]=useState({});
  if(!campaigns?.length)return null;
  const total=campaigns.reduce((s,c)=>s+(c.spend||0),0);const totalRev=campaigns.reduce((s,c)=>s+(c.revenue||0),0);
  const filtered=campaigns.filter(c=>{if(filter==='active')return c.effectiveStatus==='ACTIVE'&&c.spend>0;if(filter==='paused')return c.effectiveStatus==='PAUSED';if(filter==='kill')return c.status==='kill';return true;}).filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{const v1=a[sort.f]??-1,v2=b[sort.f]??-1;return sort.d==='desc'?v2-v1:v1-v2;});
  const loadD=async(id)=>{if(detail[id]||loading[id])return;setLoading(p=>({...p,[id]:true}));try{const d=await fetchDetail(token,id,dateQ);setDetail(p=>({...p,[id]:d}));}catch(e){}finally{setLoading(p=>({...p,[id]:false}));};};
  return(<div className="card mt-3">
    <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-white/[.02] select-none" onClick={()=>setOpen(!open)}>
      <div className="min-w-0"><span className="text-xs font-semibold text-stone-300">Legacy campaigns</span><span className="ml-2 text-[9px] text-stone-500">{campaigns.filter(c=>c.spend>0).length} active · {inr(total)}{total>0&&totalRev>0?' · '+(totalRev/total).toFixed(2)+'x':''}</span></div>
      <div className="flex items-center gap-2 flex-shrink-0"><span className="text-[9px] text-stone-600">{campaigns.length} total</span><span className="text-stone-600">{open?'▲':'▼'}</span></div>
    </div>
    {open&&<div className="sd border-t border-stone-800/40">
      <div className="flex items-center gap-1.5 px-4 py-2.5 border-b border-stone-800/30 flex-wrap">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" className="bg-stone-900 border border-stone-700 text-stone-200 text-xs px-2.5 py-1.5 outline-none w-36 focus:border-amber-600 rounded-sm flex-shrink-0"/>
        {['all','active','paused','kill'].map(f=>(<button key={f} onClick={()=>setFilter(f)} className={`text-[9px] uppercase px-2.5 py-1.5 rounded-sm ${filter===f?'bg-stone-700 text-stone-200':'text-stone-500 hover:text-stone-300'}`}>{f}</button>))}
      </div>
      <div className="tbl-wrap">
        <table className="w-full text-[11px]" style={{minWidth:'560px'}}>
          <thead><tr className="border-b border-stone-800/40">{[['Name',null],['Spend','spend'],['Revenue','revenue'],['ROAS','roas'],['Orders','purchases'],['Freq','frequency']].map(([h,sf])=>(<th key={h} className={`py-2 font-normal text-stone-600 whitespace-nowrap ${h==='Name'?'text-left pl-4':'text-right cursor-pointer hover:text-stone-400'}`} onClick={()=>sf&&setSort(s=>({f:sf,d:s.f===sf&&s.d==='desc'?'asc':'desc'}))}>{h}{sort.f===sf?sort.d==='desc'?' ▼':' ▲':''}</th>))}<th className="py-2 text-right pr-4 text-stone-600 font-normal">↗</th></tr></thead>
          <tbody>{filtered.slice(0,50).map(c=>(<React.Fragment key={c.id}>
            <tr className={`border-b border-stone-800/20 hover:bg-white/[.02] cursor-pointer ${expanded===c.id?'bg-stone-800/30':''} ${c.status==='kill'?'bg-red-950/10':''}`} onClick={()=>{if(expanded===c.id){setExpanded(null);}else{setExpanded(c.id);loadD(c.id);}}}>
              <td className="py-2 pl-4 text-stone-300 max-w-[200px]"><div className="flex items-center gap-2"><span className="text-stone-700 text-[9px] flex-shrink-0">{expanded===c.id?'▼':'▶'}</span><span className="truncate text-[11px]" title={c.name}>{c.name}</span></div></td>
              <td className="py-2 text-right mono text-stone-300 whitespace-nowrap">{c.spend>0?inr(c.spend):'—'}</td>
              <td className="py-2 text-right mono text-stone-300 whitespace-nowrap">{c.revenue>0?inr(c.revenue):'—'}</td>
              <td className={`py-2 text-right mono font-bold whitespace-nowrap ${c.roas>=1.4?'text-emerald-400':c.roas>0?c.roas>=1.0?'text-amber-400':'text-red-400':'text-stone-600'}`}>{c.roas!=null?fx(c.roas):'—'}</td>
              <td className="py-2 text-right mono text-stone-400">{c.purchases||0}</td>
              <td className="py-2 text-right mono text-stone-500 whitespace-nowrap">{c.frequency>0?c.frequency.toFixed(2)+'x':'—'}</td>
              <td className="py-2 text-right pr-4"><a href={`https://business.facebook.com/adsmanager/manage/campaigns?act=${ACCOUNT_ID}&selected_campaign_ids=${c.id}`} target="_blank" onClick={e=>e.stopPropagation()} className="text-stone-600 hover:text-stone-400">↗</a></td>
            </tr>
            {expanded===c.id&&(<tr><td colSpan={7} className="border-b border-stone-800/30 p-0"><div className="px-4 py-4">
              {loading[c.id]&&<div className="text-stone-500 text-xs py-2"><span className="spin">↻</span> Loading…</div>}
              {detail[c.id]&&(<div className="space-y-3"><div className="grid grid-cols-1 md:grid-cols-2 gap-3"><FunnelViz data={c} dateLabel={dateQ}/><UnitEconomics data={c} cfg={{targetCpa:4000,targetAov:7800}}/></div><div><div className="sec-hd mb-2">Ad sets · with recommendations</div><AdsetTable adsets={detail[c.id].adsets} budgetRealloc={detail[c.id].budgetRealloc}/></div><div><div className="sec-hd mb-2">Ads · with action recommendations</div><AdsGrid ads={detail[c.id].ads}/></div></div>)}
            </div></td></tr>)}
          </React.Fragment>))}</tbody>
        </table>
        {filtered.length>50&&<div className="px-4 py-2 text-[10px] text-stone-600 text-center">Showing 50 of {filtered.length}</div>}
      </div>
    </div>}
  </div>);
}

  const dateLabel=useMemo(()=>useCustom&&custom.s&&custom.u?`${custom.s} → ${custom.u}`:preset,[useCustom,custom,preset]);

            {lastSync&&<span className="text-[9px] text-stone-600 hidden sm:block">{syncing?'Syncing…':'Synced '+new Date(lastSync).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>}
          </div>
          <div className="flex items-center gap-1.5 flex-shrink-0">
            <button onClick={sync} disabled={syncing} className="text-[9px] px-3 py-1.5 bg-amber-600 hover:bg-amber-500 text-stone-950 font-bold rounded-sm disabled:opacity-50 uppercase tracking-widest whitespace-nowrap">{syncing?<span className="spin">↻</span>:'Sync Now'}</button>
            <button onClick={onChangeToken} className="text-[9px] w-8 h-7 border border-stone-700/60 text-stone-500 hover:text-stone-300 rounded-sm flex items-center justify-center flex-shrink-0" title="Change token">⚙</button>
          </div>
        </div>
        <div className="presets-scroll">
          {DATE_PRESETS.map(p=>(<button key={p.v} onClick={()=>{setPreset(p.v);setUseCustom(false);setExpanded(null);setDetail({});}} className={`text-[9px] px-2 py-1 rounded-sm uppercase tracking-widest whitespace-nowrap flex-shrink-0 ${(!useCustom&&preset===p.v)?'bg-stone-700 text-stone-100':'text-stone-500 hover:text-stone-300'}`}>{p.l}</button>))}
          <button onClick={()=>setShowPicker(!showPicker)} className={`text-[9px] px-2 py-1 rounded-sm whitespace-nowrap flex-shrink-0 ${useCustom?'bg-amber-700 text-stone-100':'text-stone-500 hover:text-stone-300'}`}>📅 Custom</button>
          {showPicker&&(<><input type="date" value={custom.s} onChange={e=>setCustom(p=>({...p,s:e.target.value}))} className="bg-stone-800 border border-stone-700 text-stone-200 text-[10px] px-2 py-1 outline-none rounded-sm flex-shrink-0"/><span className="text-stone-600 text-xs flex-shrink-0">→</span><input type="date" value={custom.u} onChange={e=>setCustom(p=>({...p,u:e.target.value}))} className="bg-stone-800 border border-stone-700 text-stone-200 text-[10px] px-2 py-1 outline-none rounded-sm flex-shrink-0"/><button onClick={()=>{if(custom.s&&custom.u){setUseCustom(true);setShowPicker(false);}}} className="text-[9px] px-2 py-1 bg-amber-600 text-stone-950 font-bold rounded-sm flex-shrink-0">Go</button></>)}
        </div>
      </div>
    </div>
    {/* Content */}
    <div className="wrap pt-4">
      {err&&<div className="mb-3 px-3 py-2.5 bg-red-950/30 border border-red-800/50 text-red-300 text-xs rounded-sm">{err} <button onClick={onChangeToken} className="underline ml-2">Update token</button></div>}
      {!data&&!err&&<div className="flex items-center justify-center py-32 text-stone-500 text-sm"><span className="spin mr-2">↻</span>Connecting to Meta API…</div>}
      {data&&(<>
        {/* 1. Account KPIs strip (existing) */}
        <div className="kpi-grid mb-3 rounded-sm overflow-hidden">
          {[['SPEND',inr(data.spend),'period total',null],['REVENUE',inr(data.revenue),'Meta attrib.',null],['ROAS',fx(data.roas),'target ≥1.6x',data.roas>=1.6?'good':data.roas>=1.0?'warn':'bad'],['AOV',inr(data.aov),'Core Pair ₹7,800',(data.aov||0)>=7800?'good':(data.aov||0)>=6000?'warn':'bad'],['CPA',inr(data.cpa),'target ≤₹3,200',(data.cpa||9999)<=3200?'good':'bad'],['FREQ',fx(data.frequency,2),'cap 2.5x',(data.frequency||0)<=2.5?'good':'warn'],['IC→P.',pct(data.icToPurchase),'target ≥40%',(data.icToPurchase||0)>=40?'good':'warn']].map(([l,v,s,st])=>(<div key={l} className="px-3 sm:px-4 py-3 border-r border-b border-stone-800/30 last:border-r-0"><div className="sec-hd">{l}</div><div className={`text-lg sm:text-xl font-bold mono mt-0.5 ${st==='good'?'text-emerald-400':st==='bad'?'text-red-400':st==='warn'?'text-amber-400':'text-stone-100'}`}>{v}</div><div className="text-[9px] text-stone-600 mt-0.5 leading-tight">{s}</div></div>))}
        </div>
        {/* 2. Locked Offer Config */}
        <BusinessDecisionsBar/>
        {/* 3. ★ TOTAL SUMMARY · Target / Achieved / Pending / Gap */}
        <SummaryView data={data} actuals={actuals} phaseInfo={phaseInfo}/>
        {/* 4. Underperformance Flags */}
        <UnderperformanceFlags data={data} actuals={actuals} phaseInfo={phaseInfo} campaigns={data.campaigns}/>
        {/* 5. Critical alerts */}
        {data.roas<1.0&&data.spend>0&&<div className="mb-3 px-3 py-2.5 bg-red-950/20 border border-red-900/40 text-red-300 text-[11px] rounded-sm flex items-start gap-2"><span className="flex-shrink-0">🔴</span><span><strong>Account ROAS {data.roas}x below 1.0x</strong> — contribution-negative. Every rupee of revenue costs more than it earns before COGS.</span></div>}
        {data.roas>=1.0&&data.roas<1.4&&data.spend>0&&<div className="mb-3 px-3 py-2.5 bg-red-950/10 border border-red-900/30 text-red-400 text-[11px] rounded-sm">⚠ Account ROAS {data.roas}x below kill threshold 1.4x — structurally contribution-negative.</div>}
        {data.icToPurchase!==null&&data.icToPurchase<40&&(data.ic||0)>0&&<div className="mb-3 px-3 py-2.5 bg-amber-950/20 border border-amber-900/30 text-amber-400 text-[11px] rounded-sm">⚠ IC→Purchase {data.icToPurchase}% below 40% — Razorpay payment failures. Check Razorpay dashboard.</div>}
        {/* 6. Profitability View */}
        <ProfitabilityView data={data} phaseInfo={phaseInfo}/>
        {/* 7. ★ Trends — campaign-filterable, values shown on chart */}
        <TrendsPanel data={data}/>
        {/* 8. Plan Compliance */}
        <PlanCompliance campaigns={data.campaigns} unmapped={data.unmappedCampaigns} dailyData={data.dailyData}/>
        {/* 9. Phase Tracker */}
        <PhaseTracker dailyData={data.dailyData}/>
        {/* 10. ★ C1-C9 Campaign Matrix — each card shows Target/Achieved/Pending/Gap */}
        <div className="flex items-center justify-between mb-2 mt-2">
          <div><span className="sec-hd block">Campaign Matrix · click any card for full target detail</span><span className="text-base font-bold text-stone-100">C1–C9 · per-campaign Target · Achieved · Pending · Gap</span></div>
          <span className="text-[9px] text-stone-600">{data.campaigns?.filter(c=>c.effectiveStatus==='ACTIVE').length||0}/9 active</span>
        </div>
        <div className="grid gap-2 cg" style={{gridTemplateColumns:'repeat(1,1fr)'}}>
          <style>{`@media(min-width:480px){.cg{grid-template-columns:repeat(2,1fr)!important;}}@media(min-width:768px){.cg{grid-template-columns:repeat(3,1fr)!important;}}@media(min-width:1200px){.cg{grid-template-columns:repeat(3,1fr)!important;}}`}</style>
          {SLOTS.map(cfg=>(<CampaignCard key={cfg.slot} cfg={cfg} data={slotData[cfg.slot]} days={days} onExpand={()=>slotData[cfg.slot]&&handleExpand(slotData[cfg.slot].id)}/>))}
        </div>
        {/* 11. Legacy */}
        <LegacyTable campaigns={data.unmappedCampaigns||[]} token={token} dateQ={dateQ}/>
      </>)}
    </div>
    {/* Full-screen modal */}
    {expanded&&expandedCfg&&expandedData&&<ExpandedCampaign cfg={expandedCfg} data={expandedData} detail={detail[expanded]} loading={!!loadingDetail[expanded]} onClose={()=>setExpanded(null)} onReload={()=>{setDetail(p=>{const n={...p};delete n[expanded];return n;});loadDetail(expanded);}} dateLabel={dateLabel} days={days}/>}
  </div>);
}

// Token Modal ────────────────────────────────────────────────────────
function TokenModal({onSave}){
  const[tok,setTok]=useState('');const[err,setErr]=useState('');const[testing,setTesting]=useState(false);
  const go=async()=>{if(!tok.trim()){setErr('Paste your Meta Access Token');return;}setTesting(true);setErr('');try{const r=await fetch(`${BASE}/me?fields=name&access_token=${tok.trim()}`);const d=await r.json();if(d.error)throw new Error(d.error.message);localStorage.setItem('meta_token',tok.trim());onSave(tok.trim());}catch(e){setErr('Token error: '+e.message);}finally{setTesting(false);};};
  return(<div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)'}}>
    <div className="w-full max-w-lg card p-6 sm:p-8 space-y-5">
      <div><div className="sec-hd mb-1">Pretty Pixie · Fashion Forever Trends</div><div className="text-xl font-bold text-stone-100">Connect to Meta Ads</div><div className="text-[11px] text-stone-500 mt-1">Enter your Meta System User token to access live campaign data</div></div>
      <div><label className="sec-hd block mb-2">Meta Access Token</label><textarea value={tok} onChange={e=>setTok(e.target.value)} rows={4} className="w-full bg-stone-900/80 border border-stone-700 text-stone-100 px-3 py-2.5 text-xs outline-none focus:border-amber-600 rounded-sm mono resize-none" placeholder="EAAQzImg59n..."/><div className="text-[9px] text-stone-600 mt-1.5">Meta Business Suite → System Users → Dashboard_Reader → Generate Token · Saved to this browser</div></div>
      {err&&<div className="px-3 py-2 bg-red-950/30 border border-red-800/50 text-red-300 text-xs rounded-sm">{err}</div>}
      <button onClick={go} disabled={testing} className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-stone-950 font-bold py-3 text-sm rounded-sm uppercase tracking-widest">{testing?<><span className="spin">↻</span> Verifying…</>:'Connect Dashboard'}</button>
    </div>
  </div>);
}

function App(){
  const[token,setToken]=useState(()=>localStorage.getItem('meta_token')||'');
  const[showModal,setShowModal]=useState(()=>!localStorage.getItem('meta_token'));
  const save=(t)=>{setToken(t);setShowModal(false);};
  const change=()=>{localStorage.removeItem('meta_token');setToken('');setShowModal(true);};
  return(<>{showModal&&<TokenModal onSave={save}/>}{token&&!showModal&&<Dashboard token={token} onChangeToken={change}/>}</>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
